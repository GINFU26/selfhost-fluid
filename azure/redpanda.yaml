#
# Single-node Redpanda for full-stack Routerlicious on AKS.
# Kafka wire-protocol compatible; the rdkafka orderer connects unchanged.
# Service name "redpanda" -> clients use kafka.url = redpanda:9092 (same namespace).
#
# NOTE: storage is an emptyDir (ephemeral) — fine for the broker's short-lived log
# (durable document data lives in Mongo/Cosmos + Blob). For production, back it with
# a PersistentVolumeClaim.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  labels:
    app: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
          args:
            - redpanda
            - start
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
            - --smp=1
            - --memory=1G
            - --reserve-memory=0M
            - --overprovisioned
            - --mode=dev-container
          ports:
            - name: kafka
              containerPort: 9092
            - name: admin
              containerPort: 9644
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  labels:
    app: redpanda
spec:
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: admin
      port: 9644
      targetPort: 9644
