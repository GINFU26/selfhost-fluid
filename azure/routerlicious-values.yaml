# Helm values for the routerlicious chart, full-stack on AKS.
# Replace <ACR> with your registry login server. The image is built from source and pushed
# to ACR (see README "Phase 0"), NOT pulled from MCR.
#
# The tenant key (PLACEHOLDER_KEY) is injected at install time via --set-string -- never
# commit a real key:
#   key=$(openssl rand -hex 32)
#   helm install fluid "<FLUID>/server/routerlicious/kubernetes/routerlicious" \
#     -f azure/routerlicious-values.yaml \
#     --set-string "alfred.key=$key"  --set-string "nexus.key=$key" \
#     --set-string "alfred.tenants[0].key=$key" --set-string "nexus.tenants[0].key=$key" \
#     --set-string "riddler.tenants[0].key=$key"
#
# mongodb below points at the in-cluster mongo (backends.yaml). For managed Cosmos DB for
# MongoDB (vCore) instead, set operationsDbEndpoint to the Cosmos connection string and
# directConnection: false.
image: <ACR>.azurecr.io/routerlicious:v1
imagePullPolicy: IfNotPresent

alfred:
  replicas: 1
  key: PLACEHOLDER_KEY
  host: alfred.local
  externalUrl: http://alfred.local
  api:
    patchRoot: true
  tenants:
    - _id: fluid
      key: PLACEHOLDER_KEY

nexus:
  replicas: 1
  key: PLACEHOLDER_KEY
  host: nexus.local
  externalUrl: http://nexus.local
  tenants:
    - _id: fluid
      key: PLACEHOLDER_KEY

deli:
  replicas: 1
scriptorium:
  replicas: 1
scribe:
  replicas: 1

riddler:
  replicas: 1
  tenants:
    - _id: fluid
      key: PLACEHOLDER_KEY
      storage:
        url: http://gitrest
        historianUrl: http://historian
        internalHistorianUrl: http://historian
        owner: fluid
        repository: fluid

storage:
  storageUrl: http://gitrest

historian:
  externalUrl: http://historian
  internalUrl: http://historian

mongodb:
  operationsDbEndpoint: mongodb://mongo:27017
  directConnection: true

kafka:
  url: redpanda:9092

zookeeper:
  url: ""

redis:
  url: redis
  port: 6379
  tls: false
  password: ""
redis2:
  url: redis
  port: 6379
  tls: false
  password: ""
redisForThrottling:
  url: redis
  port: 6379
  tls: false
  password: ""
redisForTenantCache:
  url: redis
  port: 6379
  tls: false
  password: ""
