#
# In-cluster backends for full-stack Routerlicious on AKS: redis + gitrest + historian,
# using the published MCR images and nconf `__` env overrides.
#
# The in-cluster redis has NO auth (dev-style), which sidesteps Azure Cache for Redis
# TLS/password wiring across gitrest's redisFs. For production, replace redis with a
# managed Azure Cache for Redis and gitrest storage with Azure Blob, and add auth
# (see azure/README.md).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels: { app: redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitrest-data
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: managed-csi
  resources:
    requests: { storage: 8Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitrest
  labels: { app: gitrest }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: gitrest } }
  template:
    metadata: { labels: { app: gitrest } }
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: gitrest
          image: mcr.microsoft.com/fluidframework/routerlicious/gitrest:latest
          ports: [{ containerPort: 3000 }]
          env:
            - { name: IS_FLUID_SERVER, value: "true" }
            - { name: NODE_ENV, value: "production" }
            - { name: redis__host, value: "redis" }
            - { name: redis__port, value: "6379" }
          volumeMounts:
            - { name: data, mountPath: /home/node/documents }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: gitrest-data }
---
apiVersion: v1
kind: Service
metadata:
  name: gitrest
spec:
  selector: { app: gitrest }
  ports: [{ port: 80, targetPort: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: historian
  labels: { app: historian }
spec:
  replicas: 1
  selector: { matchLabels: { app: historian } }
  template:
    metadata: { labels: { app: historian } }
    spec:
      containers:
        - name: historian
          image: mcr.microsoft.com/fluidframework/routerlicious/historian:latest
          ports: [{ containerPort: 3000 }]
          env:
            - { name: IS_FLUID_SERVER, value: "true" }
            - { name: NODE_ENV, value: "production" }
            # "fluid-riddler" = "<helm-release>-riddler"; install the routerlicious
            # chart with release name "fluid" so this DNS name resolves.
            - { name: riddler, value: "http://fluid-riddler" }
            - { name: storageUrl, value: "http://gitrest" }
            - { name: redis__host, value: "redis" }
            - { name: redis__port, value: "6379" }
            - { name: redisForThrottling__host, value: "redis" }
            - { name: redisForThrottling__port, value: "6379" }
---
apiVersion: v1
kind: Service
metadata:
  name: historian
spec:
  selector: { app: historian }
  ports: [{ port: 80, targetPort: 3000 }]
